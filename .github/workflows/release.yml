name: Package and Release

# Builds the addon and uploads it to CurseForge, Wago, and GitHub Releases
# when you push a version tag (e.g. v1.2.3).
#
# Tag-driven on purpose: the BigWigsMods packager refuses to package a tag it
# reaches via a branch push ("Found future tag, not packaging"), so releases
# must be triggered by the tag itself — not by pushing main.
#
# Release flow:
#   1. Bump ## Version in BarSnap.toc, add release-notes/<version>.md (this file
#      becomes the CurseForge/Wago changelog), and add a RELEASE_NOTES.md entry.
#   2. Commit to main.
#   3. Tag and push the tag:
#        git tag v1.2.3
#        git push origin v1.2.3
#
# ── One-time setup ───────────────────────────────────────────────────────────
#  Deploy runs ONLY when BOTH API keys are present; otherwise the job skips the
#  upload and logs a warning instead of publishing to just one platform.
#
#  Repo secrets (Settings → Secrets and variables → Actions → New secret):
#       CF_API_KEY      CurseForge token  (legacy.curseforge.com → My API Tokens)
#       WAGO_API_KEY    Wago token        (addons.wago.io → account → API tokens)
#     GITHUB_TOKEN is provided automatically — do not create it.
#  Project IDs already live in BarSnap.toc (## X-Curse-Project-ID / ## X-Wago-ID).
#
# ── Security ─────────────────────────────────────────────────────────────────
#  `@v2` tracks the latest v2 release. To pin against a supply-chain compromise,
#  replace it with a full commit SHA: BigWigsMods/packager@<40-char-sha>.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      # Gate the deploy: only proceed when BOTH platform keys are set. Secrets
      # can't be read directly in `if:`, so check them here via the shell and
      # expose the result as an output the later steps guard on.
      - name: Check deploy credentials
        id: creds
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_KEY: ${{ secrets.WAGO_API_KEY }}
        run: |
          if [ -n "$CF_API_KEY" ] && [ -n "$WAGO_API_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Deploy skipped — both CF_API_KEY and WAGO_API_KEY secrets must be set to publish."
          fi

      - name: Checkout
        if: steps.creds.outputs.ready == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history + tags for version detection

      # Use the curated notes for this version as the changelog the packager
      # uploads, instead of letting it dump every commit message since the last tag.
      - name: Assemble per-version changelog
        if: steps.creds.outputs.ready == 'true'
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ -f "release-notes/${version}.md" ]; then
            cp "release-notes/${version}.md" CHANGELOG.md
            echo "Using release-notes/${version}.md as the changelog."
          else
            echo "::warning::release-notes/${version}.md not found — falling back to a minimal changelog."
            printf '# %s\n\nSee RELEASE_NOTES.md for details.\n' "$version" > CHANGELOG.md
          fi

      - name: Package and release
        if: steps.creds.outputs.ready == 'true'
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_KEY }}   # env var must stay WAGO_API_TOKEN (packager requirement); secret is WAGO_API_KEY for consistency
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
