name: Package and Release

# Builds the addon and uploads it to CurseForge, Wago, and GitHub Releases
# on every push to `main`.
#
# Untagged pushes publish as ALPHA builds (versioned from `git describe`).
# To publish a STABLE release, tag the commit and push it together with main:
#
#     git tag v1.2.3
#     git push origin main --follow-tags
#
# The packager marks the upload as a release when HEAD is tagged, alpha otherwise.
#
# ── One-time setup before this works ────────────────────────────────────────
#  Deploy runs ONLY when BOTH API keys are present. If either is missing the job
#  skips the upload and logs a warning instead of publishing to just one platform.
#
#  1. Repo secrets (Settings → Secrets and variables → Actions → New secret):
#       CF_API_KEY      CurseForge token  (legacy.curseforge.com → My API Tokens)
#       WAGO_API_KEY    Wago token        (addons.wago.io → account → API tokens)
#     GITHUB_TOKEN is provided automatically — do not create it.
#  2. Add the project IDs to BarSnap.toc so uploads have a destination:
#       ## X-Curse-Project-ID: <id>
#       ## X-Wago-ID: <id>
#
# ── Security ─────────────────────────────────────────────────────────────────
#  `@v2` tracks the latest v2 release. To pin against a supply-chain compromise,
#  replace it with a full commit SHA: BigWigsMods/packager@<40-char-sha>.

on:
  push:
    branches:
      - main

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      # Gate the deploy: only proceed when BOTH platform keys are set. Secrets
      # can't be read directly in `if:`, so check them here via the shell and
      # expose the result as an output the later steps guard on.
      - name: Check deploy credentials
        id: creds
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_KEY: ${{ secrets.WAGO_API_KEY }}
        run: |
          if [ -n "$CF_API_KEY" ] && [ -n "$WAGO_API_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Deploy skipped — both CF_API_KEY and WAGO_API_KEY secrets must be set to publish."
          fi

      - name: Checkout
        if: steps.creds.outputs.ready == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history + tags for changelog and version detection

      - name: Package and release
        if: steps.creds.outputs.ready == 'true'
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_KEY }}   # env var must stay WAGO_API_TOKEN (packager requirement); secret is WAGO_API_KEY for consistency
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
